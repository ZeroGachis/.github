# Refresh the linear access token of our Linear App in Vault
# This access token is read by security-scan workflows to read/write Linear issues
name: Refresh Linear access token

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # Everyday at 04:00AM


jobs:
  refresh-linear-access-token:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      VAULT_ADDR: ${{ vars.VAULT_URL || vars.PULLREQUEST_VAULT_URL }}
      VAULT_GITHUB_ACTIONS_ROLE: ${{ vars.VAULT_GITHUB_ACTIONS_ROLE }}
    steps:
      - name: Get Linear client secret
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          role: ${{ env.VAULT_GITHUB_ACTIONS_ROLE }}
          method: jwt
          path: "github-actions"
          exportToken: true
          secrets: |
            secret/data/github-actions-common/linear CLIENT_ID | LINEAR_CLIENT_ID;
            secret/data/github-actions-common/linear CLIENT_SECRET | LINEAR_CLIENT_SECRET;

      - name: Get Linear access token
        id: get_linear_token
        shell: node {0}
        run: | # JS
          import { appendFileSync } from 'fs';

          const body = new URLSearchParams({
            grant_type: 'client_credentials',
            client_id: process.env.LINEAR_CLIENT_ID,
            client_secret: process.env.LINEAR_CLIENT_SECRET,
            scope: 'read write',
          });

          const response = await fetch('https://api.linear.app/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString(),
          });

          const responseBody = await response.json();

          if (!response.ok) {
            console.log(`::error::Linear OAuth token request failed (HTTP ${response.status})`);
            console.log(`::error::Response body: ${JSON.stringify(responseBody)}`);
            process.exit(1);
          }

          const accessToken = responseBody.access_token;

          if (!accessToken) {
            console.log('::error::Linear OAuth succeeded (HTTP 200) but no access_token in response');
            console.log(`::error::Response body: ${JSON.stringify(responseBody)}`);
            process.exit(1);
          }

          appendFileSync(process.env.GITHUB_OUTPUT, `access_token=${accessToken}\n`);

      - name: Write Linear access token to Vault
        env:
          ACCESS_TOKEN: ${{ steps.get_linear_token.outputs.access_token }}
        shell: node {0}
        run: | # JS
          const accessToken = process.env.ACCESS_TOKEN;
          const vaultAddr = process.env.VAULT_ADDR;
          const vaultToken = process.env.VAULT_TOKEN;

          console.log(`::add-mask::${accessToken}`);

          const url = `${vaultAddr}/v1/secret/data/github-actions-common/linear`;
          const payload = { data: { CLIENT_ACCESS_TOKEN: accessToken } };

          console.log(`Writing Linear access token to Vault at ${url}`);

          const response = await fetch(url, {
            method: 'PATCH',
            headers: {
              'X-Vault-Token': vaultToken,
              'Content-Type': 'application/merge-patch+json',
            },
            body: JSON.stringify(payload),
          });

          const responseBody = await response.text();

          if (!response.ok) {
            console.log(`::error::Vault PATCH request failed (HTTP ${response.status})`);
            console.log(`::error::Response body: ${responseBody}`);
            process.exit(1);
          }

          console.log(`Linear access token successfully written to Vault (HTTP ${response.status})`)
