name: Scan IaC configuration for security vulnerabilities and push the result to Github Code Scanning

on:
  workflow_call:
    inputs:
      severity:
        description: "Comma-separated list of severities to report"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      exit-code:
        description: "Exit code when vulnerabilities are found (0: do not fail, 1: fail)"
        required: false
        type: string
        default: "0"
      use-org-iac-ignore-rules:
        description: Use org-level vulnerability ignore rules when scanning IaC config
        required: false
        type: boolean
        default: true


jobs:
  security-scan-iac:
    runs-on: ubuntu-latest
    permissions:
      actions: read # required for a private repository by github/codeql-action/upload-sarif to get the Action run status
      contents: read # required to checkout the repository
      pull-requests: write
      security-events: write # required for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get trivy ignore rules
        id: get-trivy-ignore-rules
        uses: ZeroGachis/.github/.github/actions/get-trivy-ignore-rules@main
        with:
          smartway_github_bot_id: ${{ secrets.SW_BOT_APP_ID }}
          smartway_github_bot_private_key: ${{ secrets.SW_BOT_APP_PRIVATE_KEY }}
          use-org-iac-ignore-rules: ${{ inputs.use-org-iac-ignore-rules }}

      - name: Output .trivyignore file
        run: |
          # Output .trivyignore file
          cat << 'EOF' > .trivyignore-final
          ${{ steps.get-trivy-ignore-rules.outputs.trivyignore }}
          EOF

      - name: Analyze IaC configuration
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: v0.70.0
          scan-type: "config"
          format: "sarif"
          output: "trivy-results-iac.sarif"
          severity: ${{ inputs.severity }}
          exit-code: ${{ inputs.exit-code }}
          trivyignores: ".trivyignore-final"
          ignore-unfixed: true

      # Rename the tool driver to Trivy-config so it appears distinctly in GitHub Security tab, separate from Trivy-repo & Trivy-image
      - name: Edit IaC configuration analysis
        run: |
          jq ".runs[0].tool.driver.name = \"Trivy-config\"" ./trivy-results-iac.sarif > ./trivy-results-iac-edited.sarif

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        if: github.event.pull_request
        with:
          message: |
            :shield: The security scan result : [IaC](https://github.com/${{ github.repository }}/security/code-scanning?query=is%3Aopen+ref%3A${{ github.ref }}+tool%3ATrivy-config)
          comment-tag: "The security scan result of the IaC configuration"

      - name: Upload IaC configuration analysis to Github Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results-iac-edited.sarif"
