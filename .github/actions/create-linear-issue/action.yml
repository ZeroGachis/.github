name: Create Linear issue

inputs:
  access_token:
    description: "Linear OAuth access token"
    required: true
  title:
    description: "Issue title"
    required: true
  description:
    description: "Issue description"
    required: false
  team_name:
    description: "Linear team name to assign the issue to."
    required: true

runs:
  using: "composite"
  steps:
    - name: Get Linear team ID
      id: get_linear_team_id
      shell: node {0}
      env:
        LINEAR_ACCESS_TOKEN: ${{ inputs.access_token }}
        LINEAR_TEAM_NAME: ${{ inputs.team_name }}
      run: | # JS
        // Get Linear team ID from team name
        import { appendFileSync } from 'fs';

        const response = await fetch('https://api.linear.app/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${process.env.LINEAR_ACCESS_TOKEN}`,
          },
          body: JSON.stringify({
            query: `query($name: String!) { teams(filter: { name: { eqIgnoreCase: $name } }) { nodes { id name key } } }`,
            variables: { name: process.env.LINEAR_TEAM_NAME },
          }),
        });

        const body = await response.json();

        if (!response.ok) {
          console.log(`::error::Linear GraphQL request failed when fetching team (HTTP ${response.status})`);
          console.log(`::error::Response body: ${JSON.stringify(body)}`);
          process.exit(1);
        }

        if (body.errors) {
          console.log(`::error::Linear GraphQL returned errors when fetching team '${process.env.LINEAR_TEAM_NAME}'`);
          console.log(`::error::GraphQL errors: ${JSON.stringify(body.errors)}`);
          process.exit(1);
        }

        const teamId = body.data?.teams?.nodes?.[0]?.id;

        if (!teamId) {
          console.log(`::error::No Linear team found with name '${process.env.LINEAR_TEAM_NAME}'`);
          process.exit(1);
        }

        console.log(`Linear team ID is: '${teamId}'`);
        appendFileSync(process.env.GITHUB_OUTPUT, `team_id=${teamId}\n`);

    - name: Create Linear issue
      shell: node {0}
      env:
        ACCESS_TOKEN: ${{ inputs.access_token }}
        TEAM_ID: ${{ steps.get_linear_team_id.outputs.team_id }}
        TITLE: ${{ inputs.title }}
        DESCRIPTION: ${{ inputs.description }}
      run: | # JS
        // Create Linear issue
        const response = await fetch('https://api.linear.app/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${process.env.ACCESS_TOKEN}`,
          },
          body: JSON.stringify({
            query: `mutation CreateIssue($title: String!, $description: String, $teamId: String!) {
              issueCreate(input: { title: $title, description: $description, teamId: $teamId }) {
                success
                issue { id identifier url }
              }
            }`,
            variables: {
              title: process.env.TITLE,
              description: process.env.DESCRIPTION,
              teamId: process.env.TEAM_ID,
            },
          }),
        });

        const body = await response.json();

        if (!response.ok) {
          console.log(`::error::Linear GraphQL request failed when creating issue (HTTP ${response.status})`);
          console.log(`::error::Response body: ${JSON.stringify(body)}`);
          process.exit(1);
        }

        if (body.errors) {
          console.log('::error::Linear GraphQL returned errors when creating issue');
          console.log(`::error::GraphQL errors: ${JSON.stringify(body.errors)}`);
          process.exit(1);
        }

        if (!body.data?.issueCreate?.success) {
          console.log('::error::Linear reported issueCreate.success=false');
          console.log(`::error::Response body: ${JSON.stringify(body)}`);
          process.exit(1);
        }

        const issueUrl = body.data.issueCreate.issue.url;
        console.log(`Created issue: ${issueUrl}`);
