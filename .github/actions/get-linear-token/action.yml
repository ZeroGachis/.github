name: Get Linear access token

inputs:
  linear_client_id:
    description: "OAuth client ID"
    required: true
  linear_client_secret:
    description: "OAuth client secret"
    required: true

outputs:
  access_token:
    description: "Linear OAuth access token"
    value: ${{ steps.get_access_token.outputs.access_token }}

runs:
  using: "composite"
  steps:
    - name: Get Linear access token
      id: get_access_token
      env:
        LINEAR_CLIENT_ID: ${{ inputs.linear_client_id }}
        LINEAR_CLIENT_SECRET: ${{ inputs.linear_client_secret }}
      shell: node {0}
      run: |
        // Get Linear access token
        const fs = require('fs');

        const body = new URLSearchParams({
          grant_type: 'client_credentials',
          client_id: process.env.LINEAR_CLIENT_ID,
          client_secret: process.env.LINEAR_CLIENT_SECRET,
          scope: 'read write',
        });

        const response = await fetch('https://api.linear.app/oauth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString(),
        });

        const responseBody = await response.json();

        if (!response.ok) {
          console.log(`::error::Linear OAuth token request failed (HTTP ${response.status})`);
          console.log(`::error::Response body: ${JSON.stringify(responseBody)}`);
          process.exit(1);
        }

        const accessToken = responseBody.access_token;

        if (!accessToken) {
          console.log('::error::Linear OAuth succeeded (HTTP 200) but no access_token in response');
          console.log(`::error::Response body: ${JSON.stringify(responseBody)}`);
          process.exit(1);
        }

        console.log(`::add-mask::${accessToken}`);
        fs.appendFileSync(process.env.GITHUB_OUTPUT, `access_token=${accessToken}\n`);
